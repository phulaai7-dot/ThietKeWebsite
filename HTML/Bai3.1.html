<!DOCTYPE html>
<html>
<head>
 <title>Kiểm tra thông tin</title>
 <script type="text/javascript">
 function validate() {
 var hoten = document.f1.hoten.value; // Lấy giá trị của trường họ tên
 var tuoi=document.getElementById("tuoi").value; // Lấy giá trị của trường tuổi
 if (hoten === "")
 alert("Họ tên không được để trống");
 else if (tuoi === "")
 alert("Vui lòng nhập tuổi của bạn");
 else if (isNaN(tuoi) === true)
 alert("Tuổi không hợp lệ");
 else
 alert("Bạn tên là: " + hoten + " Bạn " + tuoi + " tuổi");
 }
 </script>
</head>
<body bgcolor="#d9d9d9">
 <form name="f1">
 Họ tên:
 <input type="text" id="hoten" name="hoten">
 &nbsp; Tuổi:
 <input type="text" id="tuoi" size="5" name="tuoi">
 <input type="submit" name="xacnhan" value="Xác nhận"
onclick="validate();">
 </form>
</body>
</html>
