<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng Ký Thông Tin</title>
    <style type="text/css">
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }
        table {
            background-color: #f9f9f9;
            padding: 20px;
            border-collapse: separate;
            border-spacing: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        th {
            font-size: 1.2em;
            color: #333;
            padding-bottom: 10px;
        }
        td {
            vertical-align: middle;
        }
        label.error {
            color: red;
            font-size: 13px;
        }
        input[type="text"], input[type="password"] {
            padding: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input[type="button"] {
            padding: 6px 20px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
        }
        input[type="button"]:hover {
            background-color: #45a049;
        }
    </style>

    <script type="text/javascript">
        function hienthi() {
            let userError = document.getElementById("user");
            let passError = document.getElementById("pass");
            
            userError.innerHTML = "";
            passError.innerHTML = "";
            
            let isValid = true;
            let hoten = document.formdn.hoten.value.trim();
            let matkhau = document.formdn.matkhau.value;

            if (hoten === "") {
                userError.innerHTML = "Bạn chưa nhập tên đăng nhập";
                document.formdn.hoten.focus();
                isValid = false;
            }

            if (matkhau === "") {
                passError.innerHTML = "Bạn chưa nhập mật khẩu";
                if (isValid) document.formdn.matkhau.focus();
                isValid = false;
            } else if (matkhau.length < 8) {
                passError.innerHTML = "Mật khẩu phải từ 8 ký tự trở lên";
                if (isValid) document.formdn.matkhau.focus();
                isValid = false;
            }

            if (isValid) {
                alert("Thông tin đã được gửi đi thành công!");
            }
        }
    </script>
</head>
<body>

    <form name="formdn">
        <table>
            <tr>
                <th colspan="3">THÔNG TIN ĐĂNG KÝ</th>
            </tr>
            <tr>
                <td width="100px">Họ tên:</td>
                <td><input type="text" name="hoten" id="hoten" placeholder="Nhập họ tên..."></td>
                <td width="200px"><label id="user" class="error"></label></td>
            </tr>
            <tr>
                <td>Mật khẩu:</td>
                <td><input type="password" name="matkhau" id="matkhau" placeholder="********"></td>
                <td><label id="pass" class="error"></label></td>
            </tr>
            <tr>
                <td></td>
                <td>
                    <input type="button" id="nhap" value="Nhập" onclick="hienthi();">
                </td>
                <td></td>
            </tr>
        </table>
    </form>

</body>
</html>
